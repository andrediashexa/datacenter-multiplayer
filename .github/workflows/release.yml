name: release

# Triggered by tag pushes (e.g. v0.0.9). The mod itself can't be built in CI
# because Il2CppAssemblies are generated locally on a Data Center install and
# aren't redistributable, so this workflow only opens the GitHub release shell
# and pulls the body from the annotated tag message + the latest commit body.
# The build artifact (DCMultiplayer-vX.Y.Z-win-x64.zip) is produced by
# scripts/release.ps1 and uploaded manually (or via `gh release upload`).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        run: |
          tag="${GITHUB_REF##*/}"
          # The release script annotates the tag with just the version
          # ("v0.0.9") and relies on the commit pointed at by the tag for
          # the actual changelog. Use that commit's full body as the
          # release notes; strip any Co-Authored-By trailer.
          {
            echo "## $tag"
            echo
            git log -1 --pretty=format:'%B' "$tag" | sed '/^Co-Authored-By:/,$d'
          } > notes.md
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Use the GH CLI directly. softprops/action-gh-release@v2 was
      # silently no-op'ing when releases had been deleted while the tag
      # still pointed at the same commit; the CLI's create-or-edit flow
      # is more predictable.
      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.notes.outputs.tag }}"
          if gh release view "$tag" --json tagName >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file notes.md \
              --prerelease
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file notes.md \
              --prerelease
          fi
